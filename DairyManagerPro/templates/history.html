{% extends 'base.html' %}

{% block content %}

<div class="container-fluid p-4">

<h2 class="mb-3">📅 Milk Collection History</h2>

<div class="card p-3 shadow-sm mb-3">
<form method="POST">
<label>Select Date:</label>
<input type="date" name="date" value="{{selected_date}}" class="form-control w-25 d-inline" onchange="this.form.submit()">
</form>
</div>

<div class="card p-3 shadow-sm">

<h5 class="mb-3">Collection Records</h5>

<table class="table">
<tr>
<th>ID</th>
<th>Farmer</th>
<th>Milk (L)</th>
<th>Fat %</th>
<th>Amount (₹)</th>
<th>Status</th>
<th>Time</th>
</tr>

{% for row in data %}
<tr>
<td>{{row.id}}</td>
<td>{{row.name}}</td>
<td>{{row.qty}}</td>
<td>{{row.fat}}</td>

<td>₹ {{row.amount}}</td>

<td>
<span class="badge bg-success">Completed</span>
</td>

<td>{{row.time}}</td>
</tr>
{% endfor %}

</table>

</div>

</div>

{% endblock %}

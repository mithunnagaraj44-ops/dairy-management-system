{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">📈 Profit Report</h2>

<div class="row g-4">

<div class="col-md-4">
    <div class="card bg-success text-white p-3">
        <h6>Total Sales</h6>
        <h2>₹ {{ sales }}</h2>
    </div>
</div>

<div class="col-md-4">
    <div class="card bg-warning text-white p-3">
        <h6>Total Payments</h6>
        <h2>₹ {{ payments }}</h2>
    </div>
</div>

<div class="col-md-4">
    <div class="card bg-primary text-white p-3">
        <h6>Net Profit</h6>
        <h2>₹ {{ net_profit }}</h2>
    </div>
</div>

</div>

<br>

<div class="card p-4">

<h5>📊 Monthly Profit Trend</h5>

<div style="height:300px;">
<canvas id="chart"></canvas>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('chart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
        datasets: [
            {
                label: 'Sales',
                data: {{ sales_data | tojson }},
                borderWidth: 2
            },
            {
                label: 'Profit',
                data: {{ profit_data | tojson }},
                borderWidth: 2
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false
    }
});
</script>

{% endblock %}

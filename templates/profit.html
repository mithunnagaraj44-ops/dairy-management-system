{% extends 'base.html' %}

{% block content %}

<div class="container-fluid p-4">

<h2 class="mb-4 fw-bold">📈 Profit Report</h2>

<div class="row g-4">

<div class="col-md-4">
<div class="card bg-success text-white p-3 card-box">
<h6><i class="bi bi-cart"></i> Total Sales</h6>
<h2>₹ {{ sales }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card bg-warning text-white p-3 card-box">
<h6><i class="bi bi-cash"></i> Total Payments</h6>
<h2>₹ {{ payments }}</h2>
</div>
</div>

<div class="col-md-4">
<div class="card bg-primary text-white p-3 card-box">
<h6><i class="bi bi-graph-up"></i> Net Profit</h6>
<h2>₹ {{ net_profit }}</h2>
</div>
</div>

</div>

<br>

<div class="card p-4 card-box">
<h5 class="fw-semibold">📊 Monthly Profit Trend</h5>

<div style="height:300px;">
<canvas id="chart"></canvas>
</div>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const ctx = document.getElementById('chart');

// ✅ SIMPLE + CORRECT
const salesData = JSON.parse('{{ sales_data | tojson }}');
const profitData = JSON.parse('{{ profit_data | tojson }}');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
        datasets: [
            {
                label: 'Sales',
                data: salesData,
                borderWidth: 2
            },
            {
                label: 'Profit',
                data: profitData,
                borderWidth: 2
            }
        ]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
            legend: {
                position: 'top'
            }
        },
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});
</script>

{% endblock %}

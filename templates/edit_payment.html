{% extends 'base.html' %}
{% block content %}

<h2>Edit Payment</h2>

<div class="card p-4">
    <form method="POST">

        <p><strong>Farmer:</strong> {{data.name}}</p>
        <p><strong>Amount:</strong> ₹ {{data.total_amount}}</p>

        <label>Status</label>
        <select name="status" class="form-control">
            <option value="Paid" {% if data.status=='Paid' %}selected{% endif %}>Paid</option>
            <option value="Unpaid" {% if data.status=='Unpaid' %}selected{% endif %}>Unpaid</option>
        </select>

        <br>
        <button class="btn btn-success">Update</button>

    </form>
</div>

{% endblock %}

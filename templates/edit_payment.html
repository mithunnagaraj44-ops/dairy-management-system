{% extends 'base.html' %}
{% block content %}

<div class="container p-4">

<h2 class="mb-4">💰 Edit Payment</h2>

<div class="card card-box p-4">

<form method="POST">

<div class="mb-3">
<label class="form-label">Farmer</label>
<input type="text" class="form-control" value="{{ data.name }}" readonly>
</div>

<div class="mb-3">
<label class="form-label">Amount</label>
<input type="text" class="form-control" value="₹ {{ data.total_amount }}" readonly>
</div>

<div class="mb-3">
<label class="form-label">Status</label>
<select name="status" class="form-control">
    <option value="Paid" {% if data.status=='Paid' %}selected{% endif %}>Paid</option>
    <option value="Unpaid" {% if data.status=='Unpaid' %}selected{% endif %}>Unpaid</option>
</select>
</div>

<div class="d-flex gap-2">
<button class="btn btn-success">Update</button>
<a href="/payments" class="btn btn-secondary">Cancel</a>
</div>

</form>

</div>

</div>

{% endblock %}

{% extends 'base.html' %}
{% block content %}

<div class="container p-4">

<h2 class="mb-4">📦 Edit Product</h2>

<div class="card card-box p-4">

<form method="POST">

<div class="mb-3">
<label class="form-label">Product Name</label>
<input type="text" name="product_name" value="{{ data.product_name }}" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Price (₹)</label>
<input type="number" step="0.01" name="price" value="{{ data.price }}" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Quantity</label>
<input type="number" step="0.01" name="quantity" value="{{ data.quantity }}" class="form-control" required>
</div>

<div class="d-flex gap-2">
<button class="btn btn-success">Update</button>
<a href="/stock" class="btn btn-secondary">Cancel</a>
</div>

</form>

</div>

</div>

{% endblock %}

{% extends 'base.html' %}
{% block content %}

<div class="container-fluid p-4">

<h2>🛒 Sales Management</h2>

<div class="card p-4 mt-3 shadow-sm">

<form method="POST">

<div class="row">

<div class="col-md-4">
<label>Product</label>
<select name="product_id" id="product" class="form-control" onchange="setPrice()" required>
<option value="">Select</option>
{% for p in products %}
<option value="{{p.product_id}}" data-price="{{p.price}}">
{{p.product_name}} (Stock: {{p.quantity}})
</option>
{% endfor %}
</select>
</div>

<div class="col-md-2">
<label>Price</label>
<input type="text" id="price" class="form-control" readonly>
</div>

<div class="col-md-2">
<label>Quantity</label>
<input type="number" id="qty" name="quantity" class="form-control" oninput="calculate()" required>
</div>

<div class="col-md-2">
<label>Total</label>
<input type="text" id="total" class="form-control" readonly>
</div>

<div class="col-md-2 d-flex align-items-end">
<button class="btn btn-success w-100">Sell</button>
</div>

</div>

</form>

</div>

<div class="card mt-4 p-3 shadow-sm">

<h4>Sales History</h4>

<table class="table mt-3">
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th>Date</th>
</tr>

{% for row in data %}
<tr>
<td>{{row.product_name}}</td>
<td>{{row.price}}</td>
<td>{{row.quantity}}</td>
<td>{{row.total}}</td>
<td>{{row.date}}</td>
</tr>
{% endfor %}

</table>

</div>

</div>

<script>
function setPrice(){
    let select = document.getElementById("product")
    let price = select.options[select.selectedIndex].getAttribute("data-price")
    document.getElementById("price").value = price || ""
}

function calculate(){
    let price = parseFloat(document.getElementById("price").value) || 0
    let qty = parseFloat(document.getElementById("qty").value) || 0
    document.getElementById("total").value = (price * qty).toFixed(2)
}
</script>

{% endblock %}
